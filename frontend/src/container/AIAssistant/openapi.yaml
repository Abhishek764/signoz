            @-picked.'
        type:
          type: string
          enum:
          - dashboard
          - alert
          - saved_view
          - logs_explorer
          - traces_explorer
          - metrics_explorer
          - service
          title: Type
          description: Resource taxonomy. Use metadata.page for concrete page identity.
        resourceId:
          anyOf:
          - type: string
            maxLength: 256
          - type: 'null'
          title: Resourceid
          description: "Required for resource-detail pages: dashboard_detail, panel_edit,\
            \ panel_fullscreen, alert_edit, service_detail. Always required for saved_view\
            \ (mention-only \u2014 no list page in V1). Must be null for list/index/draft/detail-as-metadata\
            \ pages such as dashboard_list, alert_list, alert_new, alerts_triggered,\
            \ services_list, log_detail, and trace_detail."
        resourceName:
          anyOf:
          - type: string
            maxLength: 256
          - type: 'null'
          title: Resourcename
        metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Metadata
          description: 'Page-specific extras. metadata.page identifies list/draft
            pages and detail-as-metadata pages. Required non-empty metadata keys:
            panel_edit.widgetId, panel_fullscreen.widgetId, trace_detail.traceId.
            timeRange.{start,end} use Unix milliseconds.'
      type: object
      required:
      - source
      - type
      title: MessageContext
      examples:
      - metadata:
          page: dashboard_detail
          timeRange:
            end: 1714203600000
            start: 1714200000000
        resourceId: <dashboard-uuid>
        source: auto
        type: dashboard
      - metadata:
          page: dashboard_list
        source: auto
        type: dashboard
      - metadata:
          page: alerts_triggered
        source: auto
        type: alert
      - metadata:
          page: service_detail
          timeRange:
            end: 1714203600000
            start: 1714200000000
        resourceId: frontend
        source: auto
        type: service
      - metadata:
          page: trace_detail
          timestamp: 1714200000000
          traceId: 0123abcdef0123abcdef0123abcdef01
        source: auto
        type: traces_explorer
      - metadata:
          filter: severity_text = 'ERROR'
