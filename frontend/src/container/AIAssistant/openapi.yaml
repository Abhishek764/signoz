openapi: 3.1.0
info:
  title: SigNoz AI Assistant API
  description: AI-powered assistant for SigNoz observability platform.
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      tags:
      - Health
      summary: Ready
      operationId: ready_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: One or more checks failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /api/v1/assistant/threads:
    post:
      tags:
      - Threads
      summary: Create a new thread
      operationId: create_thread_api_v1_assistant_threads_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/CreateThreadRequest'
              - type: 'null'
              title: Body
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateThreadResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Threads
      summary: List threads
      description: Cursor-based pagination, sorted by updatedAt desc. Use `archived=true|false|all`
        to filter.
      operationId: list_threads_api_v1_assistant_threads_get
      parameters:
      - name: archived
        in: query
        required: false
        schema:
          enum:
          - 'true'
          - 'false'
          - all
          type: string
          description: 'Filter: true, false, or all'
          default: 'false'
          title: Archived
        description: 'Filter: true, false, or all'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 20
          title: Limit
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Opaque cursor from previous response's nextCursor
          title: Cursor
        description: Opaque cursor from previous response's nextCursor
      - name: sort
        in: query
        required: false
        schema:
          const: updated_desc
          type: string
          description: 'Sort order. V1: updated_desc only'
          default: updated_desc
          title: Sort
        description: 'Sort order. V1: updated_desc only'
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadListResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/threads/{thread_id}:
    get:
      tags:
      - Threads
      summary: Get thread with full conversation state
      description: Cold-start reconstruction path. Returns all messages, pending approval/clarification,
        and active execution.
      operationId: get_thread_api_v1_assistant_threads__thread_id__get
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Thread Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadDetailResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '404':
          description: thread_not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Threads
      summary: Update thread (rename or archive/unarchive)
      operationId: update_thread_api_v1_assistant_threads__thread_id__patch
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Thread Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThreadRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadSummary'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '404':
          description: thread_not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: thread_has_active_execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/threads/{thread_id}/messages:
    post:
      tags:
      - Messages
      summary: Send a message and start execution
      description: 'Persists the user message, creates an execution (state: queued),
        kicks off the agent loop asynchronously, and returns immediately. Open `GET
        /executions/{executionId}/events` for the SSE stream.'
      operationId: create_message_api_v1_assistant_threads__thread_id__messages_post
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Thread Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMessageResponse'
        '400':
          description: invalid_content_length / invalid_fork_target / validation_error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '404':
          description: thread_not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: thread_busy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: hourly_message_limit / daily_message_limit / daily_token_limit
          headers:
            Retry-After:
              description: Seconds until the client may retry the request.
              schema:
                type: integer
                minimum: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/executions/{execution_id}/events:
    get:
      tags:
      - Messages
      summary: Subscribe to execution events (SSE)
      description: Opens a Server-Sent Events stream for the given execution. Pass
        `Last-Event-ID` header to replay missed events on reconnect.
      operationId: execution_events_api_v1_assistant_executions__execution_id__events_get
      parameters:
      - name: execution_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Execution Id
      - name: Last-Event-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Last-Event-Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      responses:
        '200':
          description: SSE event stream
          content:
            application/json:
              schema: {}
            text/event-stream:
              schema:
                description: 'Server-Sent Events stream. Each event has `event: <type>`
                  and `data: <json>` fields.'
                oneOf:
                - $ref: '#/components/schemas/ApprovalEvent'
                - $ref: '#/components/schemas/ClarificationEvent'
                - $ref: '#/components/schemas/ConversationEvent'
                - $ref: '#/components/schemas/DoneEvent'
                - $ref: '#/components/schemas/ErrorEvent'
                - $ref: '#/components/schemas/MessageEvent'
                - $ref: '#/components/schemas/StatusEvent'
                - $ref: '#/components/schemas/ThinkingEvent'
                - $ref: '#/components/schemas/ToolCallEvent'
                - $ref: '#/components/schemas/ToolResultEvent'
        '404':
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/messages/{message_id}/regenerate:
    post:
      tags:
      - Messages
      summary: Regenerate assistant response
      description: Clean-slate regeneration. Starts a fresh execution with conversation
        history up to (excluding) the original assistant response.
      operationId: regenerate_message_api_v1_assistant_messages__message_id__regenerate_post
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Message Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegenerateResponse'
        '400':
          description: validation_error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '404':
          description: message_not_found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: thread_busy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/approve:
    post:
      tags:
      - Actions
      summary: Approve a pending action
      description: "Triggers a replay execution that runs the stored tool call with\
        \ exact params. Returns a new executionId \u2014 open SSE for that execution."
      operationId: approve_api_v1_assistant_approve_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '409':
          description: approval_superseded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/reject:
    post:
      tags:
      - Actions
      summary: Reject a pending action
      description: Marks the approval as rejected. The execution completes with no
        tool execution.
      operationId: reject_api_v1_assistant_reject_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RejectResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '409':
          description: approval_superseded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/clarify:
    post:
      tags:
      - Actions
      summary: Submit clarification answers
      description: Provides structured answers to a clarification request. Starts
        a new execution that resumes the agent with the answers as tool results.
      operationId: clarify_api_v1_assistant_clarify_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClarifyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClarifyResponse'
        '400':
          description: validation_error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '409':
          description: clarification_superseded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/cancel:
    post:
      tags:
      - Actions
      summary: Cancel the active execution on a thread
      description: Cooperative cancel. The agent loop finishes its current step, emits
        a truncated message if streaming, and transitions to canceled.
      operationId: cancel_api_v1_assistant_cancel_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '409':
          description: no_active_execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/undo:
    post:
      tags:
      - Actions
      summary: Undo a create action
      description: Deletes the resource that was created by the assistant.
      operationId: undo_api_v1_assistant_undo_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz instance base URL for multi-tenant deployments. Falls
            back to SIGNOZ_API_URL env var when omitted.
          title: X-Signoz-Url
        description: SigNoz instance base URL for multi-tenant deployments. Falls
          back to SIGNOZ_API_URL env var when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndoRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResultResponse'
        '400':
          description: validation_error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        '409':
          description: undo_conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/assistant/revert:
    post:
      tags:
      - Actions
      summary: Revert a modify action
      description: Rolls back the resource to its pre-change snapshot.
      operationId: revert_api_v1_assistant_revert_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: SigNoz auth token (Bearer or raw JWT)
          title: Authorization
        description: SigNoz auth token (Bearer or raw JWT)
      - name: X-SigNoz-URL
        in: header
        required: false
        schema:
          anyOf:
